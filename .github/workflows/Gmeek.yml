name: 构建博客

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, closed, deleted, reopened, labeled, unlabeled, pinned, unpinned]
  schedule:
    - cron: "0 0,12 * * *"

concurrency:
  group: gmeek-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 生成站点
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.repository.owner.id == github.event.sender.id }}
    permissions: write-all
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: 克隆生成器
        id: generator
        run: |
          GMEEK_VERSION=$(python3 -c "import json; print(json.load(open('config.json', encoding='utf-8'))['GMEEK_VERSION'])")
          git clone https://github.com/cao-gift/Gmeek.git .gmeek
          cd .gmeek
          if [ "$GMEEK_VERSION" = 'last' ]; then
            latestTaggedCommit=$(git rev-list --tags --max-count=1)
            if [ -n "$latestTaggedCommit" ]; then
              lastTag=$(git describe --tags "$latestTaggedCommit")
              git checkout "$lastTag"
            else
              echo "未找到标签，使用默认分支。"
            fi
          else
            git checkout "$GMEEK_VERSION"
          fi
          echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .gmeek/requirements.txt

      - name: 恢复渲染缓存
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/gmeek-cache
          key: gmeek-v2-${{ runner.os }}-${{ github.repository_id }}-${{ hashFiles('.gmeek/requirements.txt') }}-${{ steps.generator.outputs.ref }}-${{ hashFiles('blogBase.json') }}
          restore-keys: |
            gmeek-v2-${{ runner.os }}-${{ github.repository_id }}-${{ hashFiles('.gmeek/requirements.txt') }}-${{ steps.generator.outputs.ref }}-
            gmeek-v2-${{ runner.os }}-${{ github.repository_id }}-${{ hashFiles('.gmeek/requirements.txt') }}-

      - name: 安装依赖
        run: python -m pip install -r .gmeek/requirements.txt

      - name: 生成站点
        env:
          GMEEK_CACHE_DIR: ${{ runner.temp }}/gmeek-cache
        run: |
          cp -r ./* .gmeek/
          cd .gmeek
          python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number '${{ github.event.issue.number }}'
          rm -rf "${{ github.workspace }}/docs" "${{ github.workspace }}/backup"
          cp -a docs "${{ github.workspace }}/docs"
          cp -a backup "${{ github.workspace }}/backup"
          cp blogBase.json "${{ github.workspace }}/blogBase.json"
          
      - name: 提交更新
        run: |
          git config --local user.email "$(python -c "import json; print(json.load(open('config.json', encoding='utf-8'))['email'])")"
          git config --local user.name "${{ github.repository_owner }}"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m '🎉auto update by Gmeek action'
            git push
          fi
          
      - name: 上传站点
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/.'
          
  deploy:
    name: 发布站点
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
