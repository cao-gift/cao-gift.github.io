name: build Gmeek

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, closed, deleted, reopened, labeled, unlabeled, pinned, unpinned]
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: gmeek-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.repository.owner.id == github.event.sender.id }}
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Clone source code
        run: |
          GMEEK_VERSION=$(python3 -c "import json; print(json.load(open('config.json', encoding='utf-8'))['GMEEK_VERSION'])")
          git clone https://github.com/cao-gift/Gmeek.git .gmeek
          cd .gmeek
          if [ "$GMEEK_VERSION" = 'last' ]; then
            latestTaggedCommit=$(git rev-list --tags --max-count=1)
            if [ -n "$latestTaggedCommit" ]; then
              lastTag=$(git describe --tags "$latestTaggedCommit")
              git checkout "$lastTag"
            else
              echo "No tags found; using the repository default branch."
            fi
          else
            git checkout "$GMEEK_VERSION"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          cache: pip
          cache-dependency-path: .gmeek/requirements.txt

      - name: Restore Gmeek render cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/gmeek-cache
          key: gmeek-v1-${{ runner.os }}-${{ github.repository_id }}-${{ github.run_id }}
          restore-keys: |
            gmeek-v1-${{ runner.os }}-${{ github.repository_id }}-

      - name: Install dependencies
        run: python -m pip install -r .gmeek/requirements.txt

      - name: Generate new html
        env:
          GMEEK_CACHE_DIR: ${{ runner.temp }}/gmeek-cache
        run: |
          cp -r ./* .gmeek/
          cd .gmeek
          python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number '${{ github.event.issue.number }}'
          rm -rf "${{ github.workspace }}/docs" "${{ github.workspace }}/backup"
          cp -a docs "${{ github.workspace }}/docs"
          cp -a backup "${{ github.workspace }}/backup"
          cp blogBase.json "${{ github.workspace }}/blogBase.json"
          
      - name: update html
        run: |
          git config --local user.email "$(python -c "import json; print(json.load(open('config.json', encoding='utf-8'))['email'])")"
          git config --local user.name "${{ github.repository_owner }}"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m '🎉auto update by Gmeek action'
            git push
          fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/.'
          
  deploy:
    name: Deploy blog
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
