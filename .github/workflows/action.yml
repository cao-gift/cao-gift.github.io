name: 云端部署
on:
  workflow_run:
    workflows: [构建博客]
    types:
      - completed

jobs:
  deploy:
    name: 同步云存储
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 同步又拍云
        uses: bwcxyk/upyun-upx-action@1.3
        env:
          UPX_SERVICENAME: ${{ secrets.UPX_SERVICENAME }}
          UPX_OPERATOR: ${{ secrets.UPX_OPERATOR }}
          UPX_PASSWORD: ${{ secrets.UPX_PASSWORD }}
          LOCAL_DIR: ./docs/
          REMOTE_DIR: /
          
      #- name: 又拍云刷新
       # uses: yiyungent/upyun-action@main
       # with:
           # upyun_username: ${{ secrets.UPYUN_USERNAME }}
            #upyun_password: ${{ secrets.UPYUN_PASSWORD }}
           # refresh_cache_urls: "https://blog.freeblock.cn/*"   
     
      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/requirements-deploy.txt

      - name: 安装依赖
        run: python -m pip install -r .github/requirements-deploy.txt

      - name: 多吉云刷新
        env:
            ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python .github/refresh-dogecloud.py
            
