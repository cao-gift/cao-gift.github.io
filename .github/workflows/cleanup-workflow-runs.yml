name: 清理运行记录

on:
  schedule:
    # 每天北京时间 02:30 执行。
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      retention_days:
        description: 删除多少天前的运行记录
        required: true
        default: 14
        type: number
      keep_minimum:
        description: 每个工作流至少保留几次运行
        required: true
        default: 10
        type: number
      dry_run:
        description: 仅预览，不删除
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

concurrency:
  group: cleanup-workflow-runs
  cancel-in-progress: false

jobs:
  cleanup:
    name: 删除过期记录
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RETENTION_DAYS: ${{ inputs.retention_days || 14 }}
      KEEP_MINIMUM: ${{ inputs.keep_minimum || 10 }}
      DRY_RUN: ${{ inputs.dry_run || false }}
    steps:
      - name: 清理过期记录
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import collections
          import datetime
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          retention_days = int(os.environ["RETENTION_DAYS"])
          keep_minimum = int(os.environ["KEEP_MINIMUM"])
          dry_run = os.environ["DRY_RUN"].lower() == "true"

          if retention_days < 1:
              raise ValueError("保留天数必须是正整数")
          if keep_minimum < 0:
              raise ValueError("每个工作流的最少保留数量不能是负数")

          api_root = f"https://api.github.com/repos/{repository}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "workflow-run-cleanup",
          }

          def api_request(url, method="GET"):
              request = urllib.request.Request(url, headers=headers, method=method)
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status == 204:
                      return None
                  return json.load(response)

          runs = []
          page = 1
          while True:
              data = api_request(
                  f"{api_root}/actions/runs?status=completed&per_page=100&page={page}"
              )
              page_runs = data.get("workflow_runs", [])
              runs.extend(page_runs)
              if len(page_runs) < 100:
                  break
              page += 1

          cutoff = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(
              days=retention_days
          )
          grouped_runs = collections.defaultdict(list)
          for run in runs:
              grouped_runs[run["workflow_id"]].append(run)

          candidates = []
          for workflow_runs in grouped_runs.values():
              workflow_runs.sort(key=lambda run: run["created_at"], reverse=True)
              for run in workflow_runs[keep_minimum:]:
                  updated_at = datetime.datetime.fromisoformat(
                      run["updated_at"].replace("Z", "+00:00")
                  )
                  if updated_at < cutoff:
                      candidates.append(run)

          candidates.sort(key=lambda run: run["updated_at"])
          deleted = 0
          failed = 0
          for run in candidates:
              print(
                  f"匹配记录 {run['id']} | {run['updated_at']} | {run['name']}"
              )
              if dry_run:
                  continue
              try:
                  api_request(f"{api_root}/actions/runs/{run['id']}", method="DELETE")
                  deleted += 1
              except urllib.error.HTTPError as error:
                  failed += 1
                  print(
                      f"删除记录 {run['id']} 失败：HTTP {error.code}",
                      file=sys.stderr,
                  )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("### 工作流运行记录清理结果\n")
              summary.write(f"- 清理截止时间：{cutoff.isoformat()}\n")
              summary.write(f"- 每个工作流最少保留：{keep_minimum}\n")
              summary.write(f"- 仅预览：{'是' if dry_run else '否'}\n")
              summary.write(f"- 匹配数量：{len(candidates)}\n")
              summary.write(f"- 删除数量：{deleted}\n")
              summary.write(f"- 失败数量：{failed}\n")

          if failed:
              raise SystemExit(1)
          PY
