var utterancesLoad=0;

let themeSettings={
    "dark": ["dark","moon","#00f0ff","dark-blue"],
    "light": ["light","sun","#ff5000","github-light"],
    "auto": ["auto","sync","","preferred-color-scheme"]
};
function changeTheme(mode, icon, color, utheme){
    document.documentElement.setAttribute("data-color-mode",mode);
    const themeSwitch=document.getElementById("themeSwitch");
    themeSwitch.setAttribute("d",IconList[icon]);
    themeSwitch.parentNode.style.color=color;
    const themeControl=themeSwitch.closest("button, a");
    const modeNames={dark:"深色",light:"浅色",auto:"跟随系统"};
    if(themeControl){
        themeControl.setAttribute("aria-label","切换主题，当前："+modeNames[mode]);
        themeControl.setAttribute("title","切换主题，当前："+modeNames[mode]);
    }
    if(utterancesLoad==1){utterancesTheme(utheme);}
}
function modeSwitch(){
    let currentMode=document.documentElement.getAttribute('data-color-mode');
    let newMode = currentMode === "light" ? "dark" : currentMode === "dark" ? "auto" : "light";
    localStorage.setItem("meek_theme", newMode);
    if(themeSettings[newMode]){
        changeTheme(...themeSettings[newMode]);
    }
}
function utterancesTheme(theme){
    const message={type:'set-theme',theme: theme};
    const iframe=document.getElementsByClassName('utterances-frame')[0];
    iframe.contentWindow.postMessage(message,'https://utteranc.es');
}
if(themeSettings[theme]){changeTheme(...themeSettings[theme]);}

if('serviceWorker' in navigator){
    window.addEventListener('load',async()=>{
        let reloading=false;
        const strings={
            available:"\u7ad9\u70b9\u6709\u65b0\u7248\u672c\u53ef\u7528\u3002",
            update:"\u7acb\u5373\u66f4\u65b0",
            clear:"\u6e05\u9664\u7f13\u5b58\u5e76\u66f4\u65b0",
            later:"\u7a0d\u540e"
        };
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
            if(reloading)return;
            reloading=true;
            window.location.reload();
        });
        const showUpdate=(worker)=>{
            if(!worker||document.getElementById('gmeek-pwa-update'))return;
            const notice=document.createElement('div');
            notice.id='gmeek-pwa-update';
            notice.setAttribute('role','status');
            notice.setAttribute('aria-live','polite');
            notice.style.cssText='position:fixed;right:16px;bottom:16px;z-index:2147483646;display:flex;flex-wrap:wrap;align-items:center;gap:8px;max-width:min(520px,calc(100vw - 32px));padding:12px 14px;border:1px solid var(--borderColor-default,#d0d7de);border-radius:12px;background:var(--bgColor-default,#fff);color:var(--fgColor-default,#1f2328);box-shadow:0 12px 36px rgba(0,0,0,.22);font-size:14px';
            const message=document.createElement('span');
            message.textContent=strings.available;
            message.style.marginRight='4px';
            notice.appendChild(message);
            [
                [strings.update,'SKIP_WAITING'],
                [strings.clear,'CLEAR_CACHES'],
                [strings.later,'']
            ].forEach(([label,type])=>{
                const button=document.createElement('button');
                button.type='button';
                button.className='btn btn-sm';
                button.textContent=label;
                button.addEventListener('click',()=>{
                    if(type)worker.postMessage({type});
                    else notice.remove();
                });
                notice.appendChild(button);
            });
            document.body.appendChild(notice);
        };
        try{
            const serviceWorkerUrl=new URL("https://blog.freeblock.cn/sw.js").pathname;
            const registration=await navigator.serviceWorker.register(serviceWorkerUrl);
            if(registration.waiting&&navigator.serviceWorker.controller)showUpdate(registration.waiting);
            registration.addEventListener('updatefound',()=>{
                const installing=registration.installing;
                if(!installing)return;
                installing.addEventListener('statechange',()=>{
                    if(installing.state==='installed'&&navigator.serviceWorker.controller){
                        showUpdate(registration.waiting||installing);
                    }
                });
            });
        }catch(error){
            console.warn('[Gmeek PWA] registration failed',error);
        }
    });
}

<script>
document.getElementById("pathHome").setAttribute("d",IconList["home"]);
document.getElementById("searchSVG").setAttribute("d",IconList["search"]);
document.getElementById("pathArchive").setAttribute("d",IconList["archive"]);

const SEARCH_UI={
    search:"\u641c\u7d22",
    noResults:"\u6ca1\u6709\u627e\u5230\u5339\u914d\u7684\u6587\u7ae0",
    loadFailed:"\u6587\u7ae0\u7d22\u5f15\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002",
    siteTitle:"\u661f\u6e90\u7b14\u8bb0"
};
const searchState={posts:[],labels:new Set(),labelColors:{},ready:false};
const resultList=document.querySelector('.SideNav');
const tagContainer=document.getElementById('taglabel');
const statusElement=document.getElementById('searchStatus');
const searchInput=document.getElementById('siteSearch');
const pageTitle=document.querySelector('.tagTitle');

const normalize=value=>(value || '').normalize('NFKC').toLocaleLowerCase();
const setStatus=(message,visible=true)=>{
    statusElement.textContent=message;
    statusElement.style.display=visible ? 'block' : 'none';
};

function createPostItem(post){
    const wrapper=document.createElement('div');
    wrapper.className='lists';
    wrapper.dataset.labels=JSON.stringify(post.labels || []);
    wrapper.dataset.search=normalize([post.postTitle,(post.labels || []).join(' '),post.description,post.searchText].join(' '));

    const item=document.createElement('a');
    item.className='SideNav-item d-flex flex-items-center flex-justify-between';
    item.href=post.postUrl;
    const center=document.createElement('div');
    center.className='d-flex flex-items-center';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','SideNav-icon octicon');
    svg.setAttribute('width','16');
    svg.setAttribute('height','16');
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',IconList.post);
    svg.appendChild(path);
    const title=document.createElement('span');
    title.className='listTitle';
    title.textContent=post.postTitle;
    center.append(svg,title);

    const labels=document.createElement('div');
    labels.className='listLabels';
    (post.labels || []).forEach(label=>{
        const badge=document.createElement('span');
        badge.className='Label LabelName';
        badge.style.backgroundColor=searchState.labelColors[label] || '#57606a';
        badge.textContent=label;
        labels.appendChild(badge);
    });
    const date=document.createElement('span');
    date.className='Label LabelTime';
    date.style.backgroundColor=post.dateLabelColor;
    date.textContent=post.createdDate;
    labels.appendChild(date);
    item.append(center,labels);
    wrapper.appendChild(item);
    return wrapper;
}

function renderIndex(payload){
    searchState.labelColors=payload.labelColorDict || {};
    searchState.posts=Object.entries(payload).filter(([key])=>key!=='labelColorDict').map(([,post])=>post);
    const counts={All:searchState.posts.length};
    searchState.posts.forEach(post=>(post.labels || []).forEach(label=>counts[label]=(counts[label] || 0)+1));
    searchState.labels=new Set(Object.keys(counts));
    searchState.labelColors.All='#24292f';

    Object.keys(counts).sort((a,b)=>counts[b]-counts[a] || a.localeCompare(b)).forEach(label=>{
        const button=document.createElement('button');
        button.className='Label';
        button.type='button';
        button.style.cssText='background-color:'+(searchState.labelColors[label] || '#57606a')+';padding:4px;';
        button.append(document.createTextNode('\u00a0\u00a0'+label+' '));
        const count=document.createElement('span');
        count.className='Counter';
        count.textContent=counts[label];
        button.appendChild(count);
        button.addEventListener('click',()=>updateShowTag(label));
        tagContainer.appendChild(button);
    });
    const fragment=document.createDocumentFragment();
    searchState.posts.forEach(post=>fragment.appendChild(createPostItem(post)));
    resultList.appendChild(fragment);
    resultList.classList.add('border');
    searchState.ready=true;
}

function applyFilter(value,forceSearch=false){
    if(!searchState.ready) return;
    const label=value || 'All';
    const isTag=!forceSearch && searchState.labels.has(label);
    const terms=normalize(value).split(/\s+/).filter(Boolean);
    let matches=0;
    document.querySelectorAll('.lists').forEach(item=>{
        const labels=JSON.parse(item.dataset.labels);
        const visible=isTag ? (label==='All' || labels.includes(label)) : terms.every(term=>item.dataset.search.includes(term));
        item.style.display=visible ? 'block' : 'none';
        if(visible) matches++;
    });
    pageTitle.textContent=(isTag ? 'Tag #' : SEARCH_UI.search+' #')+(value || (isTag ? 'All' : ''));
    document.title=(value || SEARCH_UI.search)+' - '+SEARCH_UI.siteTitle;
    setStatus(matches ? '' : SEARCH_UI.noResults+(value ? ' “'+value+'”' : ''),matches===0);
}

function updateShowTag(label){
    searchInput.value='';
    window.location.hash=encodeURIComponent(label);
    applyFilter(label);
}

function searchShow(){
    const query=searchInput.value.trim();
    window.location.hash=encodeURIComponent(query);
    applyFilter(query,true);
}

window.updateShowTag=updateShowTag;
window.searchShow=searchShow;

fetch('postList.json',{headers:{Accept:'application/json'}})
    .then(response=>{
        if(!response.ok) throw new Error('HTTP '+response.status);
        return response.json();
    })
    .then(payload=>{
        renderIndex(payload);
        let initial='All';
        try{initial=decodeURIComponent(window.location.hash.slice(1)) || 'All';}catch(error){initial='All';}
        if(searchState.labels.has(initial)) applyFilter(initial);
        else{
            searchInput.value=initial;
            applyFilter(initial,true);
        }
    })
    .catch(error=>{
        console.error('[Gmeek search]',error);
        pageTitle.textContent=SEARCH_UI.search;
        setStatus(SEARCH_UI.loadFailed);
    });

</script>
